<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frogman v1.2.1 — QA Checklist</title>
<style>
:root {
  --bg: #f4f6f7;
  --panel: #fff;
  --ink: #1a2e2d;
  --muted: #6b7c7b;
  --primary: #0f5a59;
  --accent: #009d9d;
  --pass: #2e7d32;
  --fail: #c62828;
  --skip: #ff8f00;
  --border: #d6dedc;
  --code-bg: #1a2e2d;
  --code-ink: #b8e6e4;
  --tier-a: #c62828;
  --tier-b: #e65100;
  --tier-c: #2e7d32;
  --tier-d: #1565c0;
  --tier-e: #6a1b9a;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; }
header { background: var(--primary); color: #fff; padding: 16px 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
header h1 { margin: 0 0 4px 0; font-size: 22px; }
header .sub { font-size: 13px; opacity: 0.85; }
.toolbar { display: flex; gap: 12px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
.toolbar input[type=search] { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: #fff; border-radius: 4px; font-size: 14px; }
.toolbar input[type=search]::placeholder { color: rgba(255,255,255,0.6); }
.toolbar button { padding: 8px 14px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
.toolbar button:hover { background: rgba(255,255,255,0.2); }
.progress-meter { display: flex; gap: 16px; align-items: center; font-size: 13px; }
.progress-bar { width: 200px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
.layout { display: grid; grid-template-columns: 240px 1fr; gap: 24px; padding: 24px; max-width: 1400px; margin: 0 auto; }
nav.toc { position: sticky; top: 160px; align-self: start; max-height: calc(100vh - 180px); overflow-y: auto; padding: 12px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
nav.toc h3 { margin: 0 0 8px 0; font-size: 12px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; }
nav.toc ul { list-style: none; padding: 0; margin: 0 0 12px 0; }
nav.toc li { margin: 0; }
nav.toc a { display: block; padding: 4px 6px; color: var(--ink); text-decoration: none; border-radius: 3px; font-size: 13px; }
nav.toc a:hover { background: var(--bg); }
nav.toc .tier-label { font-size: 10px; padding: 1px 5px; border-radius: 2px; color: #fff; margin-right: 6px; font-weight: 600; }
nav.toc .tier-A { background: var(--tier-a); }
nav.toc .tier-B { background: var(--tier-b); }
nav.toc .tier-C { background: var(--tier-c); }
nav.toc .tier-D { background: var(--tier-d); }
nav.toc .tier-E { background: var(--tier-e); }
main { display: flex; flex-direction: column; gap: 16px; }
.section { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.section h2 { margin: 0; padding: 14px 18px; font-size: 16px; background: linear-gradient(90deg, var(--primary), var(--accent)); color: #fff; display: flex; justify-content: space-between; align-items: center; }
.section h2 .tier-badge { font-size: 11px; padding: 2px 8px; border-radius: 3px; background: rgba(0,0,0,0.25); font-weight: 600; }
.section .section-blurb { padding: 8px 18px 0 18px; font-size: 13px; color: var(--muted); }
.commands { padding: 8px 18px 14px 18px; }
.cmd { display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--border); align-items: start; }
.cmd:last-child { border-bottom: none; }
.cmd-text { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.cmd-line { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.cmd-code { background: var(--code-bg); color: var(--code-ink); padding: 4px 10px; border-radius: 3px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 13px; word-break: break-all; }
.cmd-copy { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }
.cmd-copy:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.cmd-copy.copied { background: var(--pass); color: #fff; border-color: var(--pass); }
.cmd-expect { font-size: 12px; color: var(--muted); }
.cmd-status { display: flex; gap: 4px; align-items: center; }
.status-btn { padding: 4px 10px; border: 1px solid var(--border); background: var(--panel); border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--muted); }
.status-btn[data-state=pass].active { background: var(--pass); color: #fff; border-color: var(--pass); }
.status-btn[data-state=fail].active { background: var(--fail); color: #fff; border-color: var(--fail); }
.status-btn[data-state=skip].active { background: var(--skip); color: #fff; border-color: var(--skip); }
.cmd.passed { background: rgba(46,125,50,0.06); }
.cmd.failed { background: rgba(198,40,40,0.06); }
.cmd.skipped { opacity: 0.55; }
.notes { width: 100%; min-height: 28px; margin-top: 4px; padding: 4px 6px; border: 1px solid var(--border); border-radius: 3px; font-size: 12px; resize: vertical; font-family: inherit; display: none; }
.cmd.failed .notes, .cmd.has-notes .notes { display: block; }
.hidden { display: none !important; }
@media print {
  header { position: static; }
  nav.toc { display: none; }
  .layout { grid-template-columns: 1fr; padding: 0; }
  .toolbar, .cmd-copy { display: none; }
  .section { break-inside: avoid; page-break-inside: avoid; box-shadow: none; }
  body { background: #fff; }
}
@media (max-width: 800px) { .layout { grid-template-columns: 1fr; } nav.toc { position: static; max-height: none; } }
.legend { display: flex; gap: 12px; padding: 8px 18px; background: var(--bg); font-size: 12px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
.legend strong { color: var(--ink); }
.legend .pill { padding: 2px 8px; border-radius: 10px; font-weight: 600; color: #fff; font-size: 11px; }
.legend .pill.A { background: var(--tier-a); }
.legend .pill.B { background: var(--tier-b); }
.legend .pill.C { background: var(--tier-c); }
.legend .pill.D { background: var(--tier-d); }
.legend .pill.E { background: var(--tier-e); }
</style>
</head>

// ─── render ───────────────────────────────────────────────────────────────
const STATE_KEY = 'frogman_qa_state_v1.2.1';
let state = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
function save() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); updateProgress(); }

function el(tag, attrs={}, ...kids) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  for (const kid of kids.flat()) {
    if (kid == null) continue;
    e.appendChild(typeof kid === 'string' ? document.createTextNode(kid) : kid);
  }
  return e;
}

function renderToc() {
  const toc = document.getElementById('toc');
  toc.innerHTML = '<h3>Sections</h3>';
  const tiers = { A: 'Recently Shipped', B: 'Writes', C: 'Reads', D: 'Diagnostics', E: 'Admin / Infra' };
  for (const [tier, label] of Object.entries(tiers)) {
    const ul = el('ul');
    for (const s of SECTIONS.filter(x => x.tier === tier)) {
      ul.appendChild(el('li', {},
        el('a', { href: '#'+s.id, 'data-section': s.id },
          el('span', { class: 'tier-label tier-'+s.tier }, s.tier),
          s.title
        )
      ));
    }
    if (ul.children.length) {
      toc.appendChild(el('h3', {}, label));
      toc.appendChild(ul);
    }
  }
}

function renderMain() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  for (const s of SECTIONS) {
    const cmds = el('div', { class: 'commands' });
    s.commands.forEach((c, idx) => {
      const stateKey = s.id + '|' + idx;
      const st = state[stateKey] || {};
      const cmdEl = el('div', { class: 'cmd' + (st.status ? ' '+statusClass(st.status) : '') },
        el('div', { class: 'cmd-text' },
          el('div', { class: 'cmd-line' },
            el('code', { class: 'cmd-code' }, c.cmd),
            el('button', { class: 'cmd-copy', onclick: ev => copyCmd(ev, c.cmd) }, 'Copy'),
            c.write ? el('span', { style: 'font-size:11px; color:var(--fail); font-weight:600;' }, '✎ WRITE — confirm required') : null
          ),
          c.expect ? el('div', { class: 'cmd-expect' }, c.expect) : null,
          el('textarea', { class: 'notes', placeholder: 'Notes…', onchange: ev => { st.notes = ev.target.value; state[stateKey] = st; save(); } }, st.notes || '')
        ),
        el('div', { class: 'cmd-status' },
          ['pass','fail','skip'].map(state =>
            el('button', {
              class: 'status-btn' + (st.status === state ? ' active' : ''),
              'data-state': state,
              onclick: ev => setStatus(ev, stateKey, state)
            }, state.toUpperCase())
          )
        )
      );
      cmds.appendChild(cmdEl);
    });

    const section = el('section', { class: 'section', id: s.id },
      el('h2', {},
        el('span', {}, s.title),
        el('span', { class: 'tier-badge' }, 'Tier '+s.tier+' · '+s.commands.length+' cmd'+(s.commands.length===1?'':'s'))
      ),
      s.blurb ? el('div', { class: 'section-blurb' }, s.blurb) : null,
      cmds
    );
    main.appendChild(section);
  }
}

function statusClass(s) { return s === 'pass' ? 'passed' : s === 'fail' ? 'failed' : 'skipped'; }

function setStatus(ev, key, status) {
  const cmd = ev.target.closest('.cmd');
  cmd.classList.remove('passed','failed','skipped');
  const cur = state[key] || {};
  if (cur.status === status) {
    delete cur.status;
  } else {
    cur.status = status;
    cmd.classList.add(statusClass(status));
  }
  state[key] = cur;
  // Update active class on buttons
  cmd.querySelectorAll('.status-btn').forEach(b => b.classList.toggle('active', b.dataset.state === cur.status));
  save();
}

function copyCmd(ev, cmd) {
  navigator.clipboard.writeText(cmd).then(() => {
    const b = ev.target;
    b.textContent = 'Copied!';
    b.classList.add('copied');
    setTimeout(() => { b.textContent = 'Copy'; b.classList.remove('copied'); }, 1200);
  });
}

function updateProgress() {
  let total = 0, done = 0;
  for (const s of SECTIONS) {
    for (let i=0; i<s.commands.length; i++) {
      total++;
      const k = s.id+'|'+i;
      if (state[k] && state[k].status) done++;
    }
  }
  document.getElementById('progress-text').textContent = done+' / '+total;
  document.getElementById('progress-fill').style.width = total ? (done/total*100)+'%' : '0%';
}

function applyFilter(q) {
  q = q.trim().toLowerCase();
  document.querySelectorAll('.section').forEach(sec => {
    let any = false;
    sec.querySelectorAll('.cmd').forEach(cmd => {
      const t = cmd.textContent.toLowerCase();
      const match = !q || t.includes(q);
      cmd.classList.toggle('hidden', !match);
      if (match) any = true;
    });
    const titleMatch = !q || sec.querySelector('h2').textContent.toLowerCase().includes(q);
    sec.classList.toggle('hidden', !any && !titleMatch);
  });
}

function exportResults() {
  const lines = ['Frogman v1.2.1 QA Results — '+new Date().toISOString()];
  for (const s of SECTIONS) {
    let any = false;
    const block = ['', '## '+s.title+' (Tier '+s.tier+')'];
    s.commands.forEach((c, i) => {
      const k = s.id+'|'+i;
      const st = state[k];
      if (!st || !st.status) return;
      any = true;
      block.push('  ['+st.status.toUpperCase()+'] '+c.cmd + (st.notes ? '  // '+st.notes : ''));
    });
    if (any) lines.push(...block);
  }
  const txt = lines.join('\n');
  const blob = new Blob([txt], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'frogman-qa-results-'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function reset() {
  if (!confirm('Clear all pass/fail/skip marks and notes?')) return;
  state = {};
  save();
  renderMain();
}

renderToc();
renderMain();
updateProgress();
document.getElementById('filter').addEventListener('input', e => applyFilter(e.target.value));
document.getElementById('export-btn').addEventListener('click', exportResults);
document.getElementById('reset-btn').addEventListener('click', reset);
</script>
